name: Weekly Scholar + ORCID + OpenAlex Sync + SEO Build

on:
  schedule:
    - cron: '0 5 * * 1'   # Every Monday at 05:00 UTC
  workflow_dispatch:      # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest Scholar data via SerpApi
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SCHOLAR_AUTHOR_ID: '1I8SvsQAAAAJ'
        run: |
          set -euo pipefail
          python serpapi_fetcher.py

      - name: Fetch ORCID public record
        # ORCID Public API via 2-legged OAuth (client_credentials grant,
        # /read-public scope). Pulls works, peer-reviews, employments,
        # educations, fundings, distinctions, services into data/orcid/
        # orcid.json. The Client ID + Secret are GitHub Actions secrets;
        # never appear in source or logs.
        env:
          ORCID_CLIENT_ID:     ${{ secrets.ORCID_CLIENT_ID }}
          ORCID_CLIENT_SECRET: ${{ secrets.ORCID_CLIENT_SECRET }}
          ORCID_ID:            '0009-0006-1807-2178'
        run: |
          set -euo pipefail
          python orcid_fetcher.py

      - name: Fetch OpenAlex author + works
        # OpenAlex Public API — no key needed, polite-pool by mailto.
        # Pulls verified citations, h/i10-index, OA percentage, top
        # research concepts, and the full works list into
        # data/openalex/openalex.json.
        env:
          ORCID_ID:               '0009-0006-1807-2178'
          OPENALEX_AUTHOR_ID:     'A5102914480'
          OPENALEX_DISPLAY_NAME:  'Abdallah Abou Hajal'
          OPENALEX_MAILTO:        'abdallah.abouhajal@gmail.com'
        run: |
          set -euo pipefail
          python openalex_fetcher.py

      - name: Pre-render publications + metrics into static HTML (SEO)
        # Reads the freshly fetched data/serpapi/{serpapi,metrics}.json and
        # bakes the article list + headline metrics + Schema.org JSON-LD into
        # publications.html and theme.config.js BEFORE git commit. Result:
        # Googlebot's first crawl pass sees real publication titles, journal
        # names, and citation counts in the served HTML — not empty divs.
        run: |
          set -euo pipefail
          python build_html.py

      - name: Bake ORCID-verified panel into about.html
        # Reads data/orcid/orcid.json (just fetched) and patches the
        # idempotent ORCID-PANEL marker block in about.html with the latest
        # works/peer-review/employment counts and "last synced" date.
        run: |
          set -euo pipefail
          python build_orcid_html.py

      - name: Bake OpenAlex research-topics panel into about.html
        # Reads data/openalex/openalex.json and patches the OPENALEX-PANEL
        # marker block with topic chips, OA percentage, and i10-index.
        run: |
          set -euo pipefail
          python build_openalex_html.py

      - name: Bake co-author network into publications.html
        # Reads data/openalex/openalex.json and renders a radial SVG of
        # top co-authors (node size and edge weight scale with shared
        # paper count) plus a tabular fallback list. Patches the
        # COAUTHOR-NETWORK marker block in publications.html.
        run: |
          set -euo pipefail
          python build_coauthor_html.py

      - name: Update sitemap.xml lastmod for publications page
        # Bump the <lastmod> on the publications page so search engines know
        # the publication list changed this week.
        run: |
          python - <<'PYEOF'
          import re
          from datetime import datetime, timezone
          from pathlib import Path
          today = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          p = Path("sitemap.xml")
          if not p.exists():
              print("sitemap.xml missing, skipping")
              raise SystemExit(0)
          t = p.read_text(encoding="utf-8")
          pat = re.compile(
              r'(<url>\s*<loc>https://scholarlybrightminds\.github\.io/abdallahabouhajal/publications\.html</loc>)(.*?)(</url>)',
              re.DOTALL,
          )
          def _bump(m):
              body = m.group(2)
              if "<lastmod>" in body:
                  body = re.sub(r'<lastmod>[^<]+</lastmod>', f'<lastmod>{today}</lastmod>', body)
              else:
                  body = body + f'    <lastmod>{today}</lastmod>\n  '
              return m.group(1) + body + m.group(3)
          new = pat.sub(_bump, t)
          if new != t:
              p.write_text(new, encoding="utf-8")
              print(f"sitemap.xml: bumped publications lastmod to {today}")
          else:
              print("sitemap.xml: no change")
          PYEOF

      - name: Upload data artifacts (debugging, 7-day retention)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serpapi-data
          path: data/serpapi/
          retention-days: 7

      - name: Commit updated data, HTML, and sitemap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: weekly Scholar + ORCID + OpenAlex sync + SEO rebuild'
          file_pattern: |
            data/serpapi/*.json
            data/serpapi/*.csv
            data/orcid/*.json
            data/openalex/*.json
            publications.html
            about.html
            theme.config.js
            sitemap.xml
