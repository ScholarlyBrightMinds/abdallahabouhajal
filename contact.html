<nav class="nav" data-page="contact"></nav>

<main>

    <section class="sub-hero">
        <p class="sub-meta" data-bind="contactKicker">Get in touch</p>
        <h1 data-bind="contactH1">Let's <em>talk</em>.</h1>
        <p class="sub-lede" data-bind="contactLede"></p>
    </section>

    <hr class="rule">

    <!-- ═══ TWO-COLUMN: FORM + DIRECT CONTACT ═══ -->
    <section class="contact-grid reveal">
        <!-- Form (Formspree-backed once the endpoint is configured) -->
        <form class="contact-form" method="POST">
            <p class="contact-form-note" data-bind="contactFormNote"></p>
            <div class="contact-field">
                <label for="cf-name">Your name</label>
                <input type="text" id="cf-name" name="name" required autocomplete="name">
            </div>
            <div class="contact-field">
                <label for="cf-email">Email</label>
                <input type="email" id="cf-email" name="email" required autocomplete="email">
            </div>
            <div class="contact-field">
                <label for="cf-affil">Affiliation <span class="contact-field-opt">(optional)</span></label>
                <input type="text" id="cf-affil" name="affiliation" autocomplete="organization">
            </div>
            <div class="contact-field">
                <label for="cf-subject">Subject</label>
                <select id="cf-subject" name="subject">
                    <option>PhD position enquiry</option>
                    <option>Research collaboration</option>
                    <option>Press / podcast</option>
                    <option>Speaking invitation</option>
                    <option>Question about a paper</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="contact-field">
                <label for="cf-message">Message</label>
                <textarea id="cf-message" name="message" rows="6" required placeholder="What would you like to discuss?"></textarea>
            </div>
            <!-- Honeypot to deter bots; Formspree will discard if filled. -->
            <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" style="display:none">
            <button type="submit" class="contact-submit">
                <span>Send message</span>
                <span aria-hidden="true">→</span>
            </button>
        </form>

        <!-- Direct contact + response time -->
        <aside class="contact-direct">
            <p class="sec-kicker">Direct lines</p>
            <h2 class="contact-direct-title">Faster <em>routes</em>.</h2>
            <div data-bind="contactDirect"></div>
        </aside>
    </section>

    <hr class="rule">

    <!-- ═══ THREE AUDIENCE BLOCKS ═══ -->
    <section class="reveal">
        <p class="sec-kicker">Who's reaching out?</p>
        <h2 class="sec-title">Pick the <em>right lane</em>.</h2>
        <div class="contact-blocks" data-bind="contactBlocks"></div>
    </section>

</main>

<footer data-bind="footer"></footer>

<script src="scripts.js"></script>
</body>
</html>
